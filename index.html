<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestro Duo</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
background:url("fondo.jpg") center/cover no-repeat fixed;
color:white;
}

/* tarjeta */

.caja{
background:rgba(0,0,0,0.65);
padding:30px;
border-radius:20px;
max-width:320px;
margin:120px auto;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

/* boton estilo LOL */

button{
padding:14px 30px;
font-size:16px;
letter-spacing:2px;
border:2px solid #c8aa6e;
background:linear-gradient(#1e2328,#0a0e13);
color:#c8aa6e;
cursor:pointer;
border-radius:6px;
margin-top:20px;
transition:0.3s;
width:100%;
max-width:280px;
}

button:hover{
box-shadow:0 0 15px #c8aa6e;
transform:scale(1.05);
}

/* imagen */

#foto1{
display:none;
margin-top:20px;
width:100%;
max-width:260px;
border-radius:15px;
box-shadow:0 0 20px #c8aa6e;
}

/* imagen final grande */

#fotoFinal{
display:none;
margin-top:20px;
width:100%;
max-width:100%;
border-radius:15px;
box-shadow:0 0 25px #c8aa6e;
}

/* segunda pantalla */

#pantallaFinal{
display:none;
}

p{
font-size:14px;
line-height:1.4;
}

h1{
margin-top:0;
}

</style>
</head>

<body>

<!-- PANTALLA 1 -->

<div class="caja" id="pantalla1">

<h1>Nuestro Duo</h1>

<p>
Siempre siendo la mejor dupla, para todo uno con el otro.
</p>

<button id="btnBuscar" onclick="buscar()">BUSCAR PARTIDA</button>

<br>

<img id="foto1" src="foto2.jpg">

<br>

<button id="btnExtra" onclick="mostrarFinal()" style="display:none;">
VER RECOMPENSA DE PARTIDA
</button>

</div>


<!-- PANTALLA FINAL -->

<div class="caja" id="pantallaFinal">

<h1>Recompensa desbloqueada</h1>

<img id="fotoFinal" src="imagen3.png">

<p>
Gracias por todos los momentos, por las risas y por cada partida juntos.  
Puede que cambiemos de lobby muchas veces, pero siempre vamos a seguir siendo el mismo dúo. 🎮
</p>

</div>


<audio id="audio1" src="sonido1.mp3"></audio>
<audio id="audio2" src="sonido2.mp3"></audio>
<audio id="audio3" src="sonido3.mp3"></audio>


<script>

let repetirSonido;

function buscar(){

let boton = document.getElementById("btnBuscar");

boton.innerText = "BUSCANDO PARTIDA...";

setTimeout(function(){

document.getElementById("foto1").style.display="block";

let audio1 = document.getElementById("audio1");
let audio2 = document.getElementById("audio2");

/* empiezan juntos */

audio1.play();
audio2.play();

/* repetir audio2 cada 3 segundos */

repetirSonido = setInterval(function(){
audio2.currentTime = 0;
audio2.play();
},3000);

document.getElementById("btnExtra").style.display="inline-block";

boton.innerText = "PARTIDA ENCONTRADA";

},3000);

}

function mostrarFinal(){

clearInterval(repetirSonido);

let audio1 = document.getElementById("audio1");
let audio2 = document.getElementById("audio2");

audio1.pause();
audio2.pause();

audio1.currentTime = 0;
audio2.currentTime = 0;

document.getElementById("pantalla1").style.display="none";
document.getElementById("pantallaFinal").style.display="block";
document.getElementById("fotoFinal").style.display="block";

document.getElementById("audio3").play();

}

</script>

</body>
</html>
